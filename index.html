<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitCoach AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="brand">
            <span class="icon">💪</span>
            <div>
                <strong>FitCoach AI</strong>
                <small>Workout Planner</small>
            </div>
        </div>
    </div>
    <div id="chat-box" class="chat-box">
        <div class="message bot">
Hi 🏋️ Tell me your fitness goal!
Examples:
• 7 day home workout plan
• Exercises for weight loss
• Beginner gym routine
        </div>
    </div>
    <div class="chat-input-area">
        <textarea id="user-input" placeholder="Ask fitness question..." rows="1"></textarea>
        <button id="send-btn">Plan</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
